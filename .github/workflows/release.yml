name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/electron/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: app/python/requirements.txt

      - name: Install Python dependencies
        working-directory: app/python
        run: pip install -r requirements.txt

      - name: Install Electron dependencies
        working-directory: app/electron
        run: npm ci

      - name: Build Windows installer
        working-directory: app/electron
        run: npm run build:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenTranslator-windows-setup
          path: app/electron/dist/ScreenTranslator-*-setup.exe
          if-no-files-found: error

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          allow_updates: true
          make_latest: true
          files: app/electron/dist/ScreenTranslator-*-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
